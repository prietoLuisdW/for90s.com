<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For90s.com</title>

  <link rel="icon" type="image/png" href="./assets/img/favicon.png">

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
    rel="stylesheet"
  />
</head>

<body>
  <div
    id="app"
    class="flex min-h-screen transition-colors duration-300"
    :class="themeClasses.body"
  >
    <!-- Sidebar -->
    <aside
      class="border-r transition-all duration-300 flex flex-col"
      :class="[themeClasses.sidebar, isSidebarCollapsed ? 'w-20' : 'w-72']"
    >
    <!-- Sidebar header -->
    <div
      class="h-16 flex items-center border-b px-4"
      :class="themeClasses.sidebar"
    >
      <div
        class="w-10 h-10 rounded-full overflow-hidden border-2 shadow-md shrink-0"
        :class="themeClasses.border"
      >
        <img
          src="./assets/img/avatar.png"
          alt="Avatar"
          class="w-full h-full object-cover"
        />
      </div>

      <div v-if="!isSidebarCollapsed" class="ml-3 min-w-0">
        <h2 class="text-sm md:text-base font-semibold tracking-wide truncate">
          For90s.com
        </h2>
        <p class="text-xs opacity-70 truncate">
          Portafolio profesional
        </p>
      </div>
    </div>

      <!-- Sidebar nav -->
      <nav class="p-3 space-y-2">
        <button
          v-for="item in menu"
          :key="item.id"
          @click="setSection(item.id)"
          class="w-full flex items-center rounded-xl py-3 transition-colors duration-200"
          :class="[
            currentComponent === item.id ? themeClasses.active : themeClasses.inactive,
            isSidebarCollapsed ? 'justify-center px-0' : 'px-3'
          ]"
        >
          <span class="material-icons text-xl">
            {{ item.icon }}
          </span>

          <span v-if="!isSidebarCollapsed" class="ml-3 text-sm font-medium">
            {{ item.label }}
          </span>
        </button>
      </nav>
    </aside>

    <!-- Main area -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- Topbar -->
      <header
        class="h-16 border-b flex items-center justify-between px-4 md:px-6 transition-colors duration-300"
        :class="themeClasses.topbar"
      >
        <div class="flex items-center gap-4">


          <!-- Botón sidebar -->
          <button
            @click="toggleSidebar"
            class="inline-flex items-center justify-center rounded-lg p-2 border transition-colors duration-200"
            :class="[themeClasses.button, themeClasses.buttonHover]"
          >
            <span class="material-icons">menu</span>
          </button>

          <!-- Título -->
          <h1 class="text-sm md:text-base font-semibold tracking-wide">
            Explorando
          </h1>

        </div>

          <div class="flex items-center gap-3 md:gap-4">
            <select
              v-model="currentTheme"
              @change="applyTheme"
              class="border rounded-lg px-3 py-2 text-sm focus:outline-none transition-colors duration-200"
              :class="themeClasses.select"
            >
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="graphite">Graphite</option>
            </select>

            <!-- Instagram -->
            <button
              type="button"
              class="inline-flex items-center justify-center rounded-lg p-2 border transition-colors duration-200"
              :class="[themeClasses.button, themeClasses.buttonHover]"
              aria-label="Instagram"
              @click.prevent
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-6 h-6 fill-current">
                <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5Zm8.88 1.12a1.12 1.12 0 1 1 0 2.25 1.12 1.12 0 0 1 0-2.25ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.5A3.5 3.5 0 1 0 12 15.5 3.5 3.5 0 0 0 12 8.5Z"/>
              </svg>
            </button>

            <!-- Facebook -->
            <button
              type="button"
              class="inline-flex items-center justify-center rounded-lg p-2 border transition-colors duration-200"
              :class="[themeClasses.button, themeClasses.buttonHover]"
              aria-label="Facebook"
              @click.prevent
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-6 h-6 fill-current">
                <path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.3-1.6 1.6-1.6H16.8V4.8c-.3 0-1.2-.1-2.3-.1-2.3 0-3.8 1.4-3.8 4V11H8v3h2.7v8h2.8Z"/>
              </svg>
            </button>
          </div>
      </header>

      <!-- Main content -->
      <main class="flex-1 overflow-auto p-6 md:p-8 lg:p-10">
        <component :is="currentComponent"></component>
      </main>
    </div>
  </div>

  <!-- Vue 2 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

  <!-- Components -->
  <script src="./components/Inicio.js"></script>
  <script src="./components/Articulos.js"></script>
  <script src="./components/Servicios.js"></script>
  <script src="./components/Contacto.js"></script>

  <!-- App files -->
  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/theme.js"></script>
  <script src="./assets/js/location-data.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
